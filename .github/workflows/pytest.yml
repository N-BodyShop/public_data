# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Unit tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  TANGOS_SIMULATION_FOLDER: testdata
  TANGOS_DB_CONNECTION: test.db
  TANGOS_PROPERTY_MODULES: properties

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest requests pynbody tangos scipy pytest-order
    - name: Run serial tests
      run: |
        export TANGOS_SIMULATION_FOLDER=`realpath $TANGOS_SIMULATION_FOLDER`
        pytest --paramfile=test.conf
    - name: Run parallel tests
      run: |
        export TANGOS_SIMULATION_FOLDER=`realpath $TANGOS_SIMULATION_FOLDER`
        pytest --paramfile=test_parallel.conf
